<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEKSTRADER | Official Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --accent: #00f2ff;
            --gold: linear-gradient(135deg, #ffd700 0%, #fff9c4 50%, #ffb300 100%);
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }

        /* --- HEADER: JEKSTRADER (Tanpa C) --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding: 18px 0;
        }
        .header-container {
            max-width: 1200px; margin: 0 auto; padding: 0 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-text h2 { 
            font-size: 1.3rem; 
            letter-spacing: 3px; 
            font-weight: 800; 
            text-transform: uppercase;
            color: #fff;
        }

        .nav-links { display: flex; gap: 25px; list-style: none; align-items: center; }
        .nav-links a { 
            text-decoration: none; color: #9ca3af; font-size: 0.8rem; 
            font-weight: 700; text-transform: uppercase; transition: 0.3s;
        }
        .nav-links a:hover { color: #fff; }

        /* --- LOGO GAMBAR DI HALAMAN (DI ATAS SLOGAN) --- */
        .page-logo-wrapper {
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 25px; position: relative;
        }
        
        .rotating-logo-container {
            width: 180px; height: 180px;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            mix-blend-mode: screen; /* Menghapus background putih JPG */
        }

        .rotating-logo-container img {
            width: 100%; height: 100%; object-fit: contain;
            animation: spinY 10s infinite linear;
        }

        .glow-effect {
            position: absolute; width: 140px; height: 140px;
            background: var(--primary); border-radius: 50%;
            filter: blur(60px); opacity: 0.5; z-index: -1;
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes spinY {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(-360deg); }
        }
        @keyframes pulseGlow {
            from { transform: scale(0.9); opacity: 0.4; }
            to { transform: scale(1.1); opacity: 0.7; }
        }

        /* --- HERO SECTION --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 0 5%; }
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: space-between; gap: 50px; padding-top: 100px; }
        
        .hero-text { flex: 1.2; text-align: left; }
        .slogan { 
            font-size: 1.1rem; margin-bottom: 10px; font-weight: 800; 
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        .hero-text h1 { font-size: 4rem; font-weight: 800; margin-bottom: 20px; color: #fff; }

        /* SOSIAL MEDIA */
        .social-icons { display: flex; gap: 15px; margin-top: 30px; }
        .icon-box {
            width: 48px; height: 48px; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; font-size: 1.2rem; transition: 0.3s;
        }
        .icon-box:hover { color: var(--primary); border-color: var(--primary); transform: translateY(-5px); }

        /* FOTO PROFIL */
        .hero-visual { flex: 0.8; display: flex; justify-content: flex-end; }
        .main-card { width: 320px; padding: 20px; background: linear-gradient(145deg, #111827, #030712); border-radius: 25px; border: 1px solid var(--border); text-align: center; }
        .profile-img { width: 100%; border-radius: 18px; margin-bottom: 15px; }

        @media (max-width: 850px) {
            .nav-links { display: none; }
            .hero { flex-direction: column; text-align: center; padding-top: 140px; }
            .hero-text { text-align: center; }
            .social-icons { justify-content: center; }
            .hero-visual { justify-content: center; width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-text">
                <h2>JEKSTRADER</h2>
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="https://wa.me/62895383165361" target="_blank" style="border: 1px solid var(--primary); padding: 7px 18px; border-radius: 25px; color: var(--primary); font-weight: 800;">CONTACT</a></li>
            </ul>
        </div>
    </header>

    <div class="main-content">
        <div class="container">
            <section class="hero" id="home">
                <div class="hero-text" data-aos="fade-right">
                    
                    <div class="page-logo-wrapper">
                        <div class="glow-effect"></div>
                        <div class="rotating-logo-container">
                            <img src="nama logo.JPG" alt="JeksStars Logo">
                        </div>
                    </div>

                    <p class="slogan">Trade Like A Star</p>
                    <h1>Ahmad Zaky</h1>
                    <p style="color: #9ca3af; line-height: 1.8; max-width: 550px;">Seorang profesional trader yang berfokus pada analisis teknikal mendalam.</p>
                    
                    <div class="social-icons">
                        <a href="https://wa.me/62895383165361" class="icon-box" target="_blank"><i class="fab fa-whatsapp"></i></a>
                        <a href="https://instagram.com/whojekys" class="icon-box" target="_blank"><i class="fab fa-instagram"></i></a>
                        <a href="https://tiktok.com/@whojekys" class="icon-box" target="_blank"><i class="fab fa-tiktok"></i></a>
                    </div>
                </div>

                <div class="hero-visual" data-aos="fade-left">
                    <div class="main-card">
                        <img src="wajah.jpg" class="profile-img" alt="Ahmad Zaky">
                        <h3 style="letter-spacing: 1px;">JEKSSTARS</h3>
                        <p style="color: var(--accent); font-size: 0.8rem; font-weight: 800; margin-top: 5px;">PRO TRADER</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });
    </script>
</body>
</html>
