<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Portfolio: Jeks</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --gold: #ffc107; --purple: #7b1fa2; --white: #f5f5f5; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; text-align: center; }
        nav { background: var(--card); padding: 15px; border-bottom: 2px solid var(--purple); }
        .logo-img { height: 50px; border-radius: 5px; }
        .hero { padding: 60px 20px; background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%); }
        .profile-pic { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--gold); object-fit: cover; box-shadow: 0 0 20px rgba(255,193,7,0.3); }
        .grid { display: flex; flex-direction: column; gap: 20px; padding: 20px; align-items: center; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; width: 90%; max-width: 500px; border: 1px solid #333; }
        .card img { width: 100%; border-radius: 8px; margin-top: 10px; }
        h1 { color: var(--gold); margin-top: 15px; }
        p { color: #bbb; }
    </style>
</head>
<body>

    <nav>
        <img src="logo.jpg" alt="Logo" class="logo-img">
    </nav>

    <section class="hero">
        <img src="wajah.jpg" alt="Jeks" class="profile-pic">
        <h1>Professional Trader Trainer</h1>
        <p>Mastering Mindset & Market Analysis</p>
    </section>

    <div class="grid">
        <div class="card">
            <h3>Trading Setup</h3>
            <img src="keahlian.jpg" alt="Setup">
        </div>

        <div class="card">
            <h3>Technical Analysis</h3>
            <img src="keahlian2.jpg" alt="Analysis">
        </div>
    </div>

    <footer style="padding: 30px; font-size: 12px; color: #555;">
        &copy; 2026 Portofolio Jeks - Built with Discipline
    </footer>

</body>
</html>
